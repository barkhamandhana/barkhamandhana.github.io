<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gender Reveal Scratch Bingo</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        text-align: center;
        background: radial-gradient(circle, #ffe4ec, #cfe8ff);
        padding: 25px;
    }

    h1 { margin-bottom: 5px; }

    .board {
        display: grid;
        grid-template-columns: repeat(3, 110px);
        gap: 14px;
        justify-content: center;
        margin-top: 25px;
    }

    .cell {
        position: relative;
        width: 110px;
        height: 110px;
        border-radius: 16px;
        overflow: hidden;
        background: white;
        box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }

    .label {
        position: absolute;
        width: 100%;
        height: 100%;
        font-size: 15px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 0;
    }

    canvas {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 2;
    }

    .locked {
        opacity: 0.4;
    }

    #final {
        display: none;
        margin-top: 30px;
        font-size: 34px;
        font-weight: bold;
        color: #0066ff;
    }
</style>
</head>

<body>

<h1>🎉 Scratch Bingo Reveal 🎉</h1>
<p>Scratch one box at a time 👇</p>

<div class="board" id="board"></div>

<div id="final">💙 FINAL REVEAL: IT'S A BABY BOY! 💙</div>

<script>

const board = document.getElementById("board");

let current = 0;
const TOTAL = 9;

// 🎯 STRUCTURED GRID (your requirement)
const grid = [
    "It's a Girl 💖",   "??? 🤔",            "It's a Boy 💙",
    "??? 🤔",           "It's a Boy 💙",    "??? 🤔",
    "It's a Girl 💖",   "??? 🤔",            "It's a Boy 💙"
];

function createCell(index) {

    const cell = document.createElement("div");
    cell.className = "cell";

    const label = document.createElement("div");
    label.className = "label";
    label.innerText = "Scratch ✨";

    const canvas = document.createElement("canvas");
    canvas.width = 110;
    canvas.height = 110;

    const ctx = canvas.getContext("2d");

    // scratch layer
    ctx.fillStyle = "#c0c0c0";
    ctx.fillRect(0, 0, 110, 110);
    ctx.fillStyle = "#444";
    ctx.font = "12px Arial";
    ctx.fillText("Scratch", 30, 60);

    let isDrawing = false;

    function scratch(x, y) {
        ctx.globalCompositeOperation = "destination-out";
        ctx.beginPath();
        ctx.arc(x, y, 15, 0, Math.PI * 2);
        ctx.fill();
    }

    function start(e) {
        if (index !== current) return;

        isDrawing = true;
        const rect = canvas.getBoundingClientRect();

        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

        scratch(x, y);
    }

    function move(e) {
        if (!isDrawing || index !== current) return;

        const rect = canvas.getBoundingClientRect();

        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

        scratch(x, y);
    }

    function end() {
        if (index !== current) return;


        isDrawing = false;

        // reveal stable text (NO animation, NO flicker)
        canvas.style.display = "none";
        label.innerText = grid[index];

        current++;

        if (current < TOTAL) {
            board.children[current].classList.remove("locked");
        } else {
            document.getElementById("final").style.display = "block";
        }
    }

    canvas.addEventListener("mousedown", start);
    canvas.addEventListener("mousemove", move);
    canvas.addEventListener("mouseup", end);

    canvas.addEventListener("touchstart", start);
    canvas.addEventListener("touchmove", move);
    canvas.addEventListener("touchend", end);

    if (index !== 0) cell.classList.add("locked");

    cell.appendChild(label);
    cell.appendChild(canvas);
    board.appendChild(cell);
}

function init() {
    board.innerHTML = "";
    current = 0;
    document.getElementById("final").style.display = "none";

    for (let i = 0; i < TOTAL; i++) {
        createCell(i);
    }
}

init();

</script>

</body>
</html>
